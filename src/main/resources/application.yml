spring:
  application:
    name: ecommerce-api
  config:
    import: optional:file:.env[.properties]
  datasource:
    url: ${DATABASE_URL}
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        show_sql: true
        use_sql_comments: true
        type:
          descriptor:
            sql: trace

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${EMAIL}
    password: ${EMAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          ssl:
            trust: smtp.gmail.com

server:
  port: ${SERVER_PORT:8080}
  error:
    include-message: never

app:
  jwt:
    secret: ${JWT_SECRET}
    access-token-minutes: ${JWT_ACCESS_TOKEN_MINUTES}
    refresh-token-days: ${JWT_REFRESH_TOKEN_DAYS}

  mail:
    from: ${MAIL_FROM}
  inventory:
    low-stock-threshold: ${LOW_STOCK_THRESHOLD}
  seed:
    enabled: ${DATA_SEEDER_ENABLED:true}

  rate-limit:
    enabled: true
    default-anonymous-capacity: 20
    default-anonymous-refill: 20
    default-anonymous-duration-minutes: 1
    default-authenticated-capacity: 100
    default-authenticated-refill: 100
    default-authenticated-duration-minutes: 1
    excluded-paths:
      - "/"
      - "/index.html"
      - "/app.css"
      - "/app.js"
      - "/favicon.ico"
      - "/api-docs/**"
      - "/swagger-ui/**"
      - "/swagger-ui.html"
      - "/error"
    path-limits:
      "/api/v1/auth/login":
        capacity: 5
        refill: 5
        duration-minutes: 1
      "/api/v1/auth/register":
        capacity: 5
        refill: 5
        duration-minutes: 1

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} %5p [correlationId=%X{correlationId:-}] [%thread] --- %logger{36} : %msg%n"
    level: "%5p [correlationId=%X{correlationId:-}]"
  level:
    root: INFO
    # --- Hibernate / JPA SQL Logging ---
    org.hibernate.SQL: DEBUG
    org.hibernate.orm.jdbc.bind: TRACE
    org.hibernate.type.descriptor.sql: TRACE
    org.hibernate.tool.schema: DEBUG
    org.hibernate.engine.transaction: DEBUG
    # --- Spring Framework ---
    org.springframework.web: DEBUG
    org.springframework.web.servlet.DispatcherServlet: DEBUG
    org.springframework.transaction: DEBUG
    # --- Error & Exception Handling ---
    org.springframework.boot.web.servlet.error: DEBUG
    org.springframework.web.servlet.mvc.method.annotation: DEBUG
    # --- Your Application Package (change to your base package) ---
    com.ecommerce: DEBUG

management:
  endpoints:
    web:
      exposure:
        include: "*"